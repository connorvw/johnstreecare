<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | John's Tree Care</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #14532D; --accent: #CA8A04; --bg: #FAFAF9; --text: #1C1917; --text-muted: #57534E; --white: #ffffff; --border: #D6D3D1; --dark: #0C1A12; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    .navbar { background: var(--primary); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; max-width: 1440px; margin: 0 auto; width: 100%; }
    .nav-logo { font-family: 'Archivo Black', sans-serif; font-size: 1.2rem; color: var(--white); text-decoration: none; }
    .nav-phone { font-weight: 700; color: var(--accent); text-decoration: none; font-size: 0.95rem; padding: 6px 16px; background: rgba(202,138,4,0.15); border-radius: 999px; border: 1px solid rgba(202,138,4,0.3); }
    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 80px 24px; text-align: center; }
    .inner { max-width: 520px; }
    .error-code { font-family: 'Archivo Black', sans-serif; font-size: 7rem; color: var(--border); line-height: 1; margin-bottom: 8px; }
    h1 { font-family: 'Archivo Black', sans-serif; font-size: 2rem; color: var(--primary); margin-bottom: 16px; }
    p { font-size: 1rem; color: var(--text-muted); margin-bottom: 32px; line-height: 1.6; }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    .btn { display: inline-block; padding: 14px 28px; border-radius: 999px; font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 700; text-decoration: none; min-height: 48px; cursor: pointer; border: none; text-transform: uppercase; letter-spacing: 0.06em; }
    .btn-primary { background: var(--accent); color: white; border-bottom: 4px solid #a16f03; }
    .btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
    footer { background: var(--dark); color: rgba(255,255,255,0.5); text-align: center; padding: 20px; font-size: 0.85rem; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-logo">John's Tree Care</a>
    <a href="tel:8655550200" class="nav-phone">(865) 555-0200</a>
  </nav>
  <main class="main">
    <div class="inner">
      <div class="error-code">404</div>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or may have moved. Head back to the homepage or give us a call.</p>
      <div class="actions">
        <a href="/" class="btn btn-primary">Back to Homepage</a>
        <a href="/#services" class="btn btn-outline">View Our Services</a>
      </div>
      <p style="margin-top:32px;"><a href="tel:8655550200" style="color:var(--primary);font-weight:700;">(865) 555-0200</a> — Call us directly</p>
    </div>
  </main>
  <footer>&copy; 2025 John's Tree Care. Knoxville, TN.</footer>
</body>
</html>
